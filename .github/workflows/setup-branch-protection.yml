name: Setup Branch Protection

on:
  workflow_dispatch:
    inputs:
      token-type:
        description: Token to use (admin_pat or github_token)
        required: true
        default: admin_pat
        type: choice
        options:
          - admin_pat
          - github_token

jobs:
  protect-main:
    name: Protect main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply branch protection
        env:
          GH_TOKEN: ${{ inputs.token-type == 'admin_pat' && secrets.ADMIN_PAT || secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/setup-branch-protection.sh
