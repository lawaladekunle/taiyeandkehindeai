name: Setup Branch Protection

on:
  workflow_dispatch:
    inputs:
      token-type:
        description: Token to use (admin_pat or github_token)
        required: true
        default: admin_pat
        type: choice
        options:
          - admin_pat
          - github_token

jobs:
  protect-main:
    name: Protect main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Apply branch protection (admin_pat)
        if: inputs.token-type == 'admin_pat'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: .github/scripts/setup-branch-protection.sh

      - name: Apply branch protection (github_token)
        if: inputs.token-type == 'github_token'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/setup-branch-protection.sh
