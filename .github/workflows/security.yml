name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  secrets-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --only-verified

  lint-gha:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest 2>/dev/null || true
          which actionlint 2>/dev/null || echo "actionlint not available, skipping"

      - name: Validate workflows
        run: |
          if command -v actionlint &> /dev/null; then
            actionlint
          else
            echo "actionlint not installed, skipping workflow validation"
          fi
